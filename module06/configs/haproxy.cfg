
# ============================================================
# HAProxy Configuration — InfraScale Module 06
# ============================================================

global
    # Send logs to local syslog. Integrates with journalctl.
    log 127.0.0.1 local2

    # Chroot for security isolation.
    chroot /var/lib/haproxy

    # PID (Process ID) file for systemd tracking.
    pidfile /var/run/haproxy.pid

    # Maximum simultaneous connections.
    maxconn 4000

    # Run as unprivileged user for security.
    user haproxy
    group haproxy

    # Run as background daemon.
    daemon

    # Stats socket for runtime inspection.
    stats socket /var/lib/haproxy/stats


defaults
    # Operate at HTTP layer (Layer 7). Use "tcp" for Layer 4.
    mode http

    log global

    # Log full HTTP requests (not just errors).
    option httplog

    # Skip logging empty connections (reduces noise).
    option dontlognull

    # Reuse HTTP connections for performance.
    option http-server-close

    # Pass real client IP to backends via X-Forwarded-For header.
    option forwardfor except 127.0.0.0/8

    timeout connect 10s
    timeout client 60s
    timeout server 60s
    timeout http-keep-alive 10s

    # Maximum time for a health check response.
    timeout check 5s

    # Retries before marking a server as failed.
    retries 3


# Built-in web dashboard for real-time monitoring.
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s

    # Protect dashboard with credentials.
    stats auth admin:infrascale


# Where HAProxy receives incoming client connections.
frontend http_front
    # Listen on port 80 for all HTTP traffic.
    bind *:80

    # Route everything to the backend pool.
    default_backend app_backend


# Pool of real servers and traffic distribution rules.
backend app_backend
    # round-robin: sequential rotation. Alternative: "leastconn".
    balance leastconn

    # HTTP-level health check: GET /health expecting 200 OK.
    option httpchk GET /health

    # "check" enables health checking. "inter 3s" = check every 3 seconds.
    # "fall 3" = mark DOWN after 3 consecutive failures.
    # "rise 2" = mark UP after 2 consecutive successes.
    server netrunner2 10.0.2.15:8082 check inter 3s fall 3 rise 2
    server netrunner3 10.0.2.35:8082 check inter 3s fall 3 rise 2
    server netrunner4 10.0.2.45:8082 check inter 3s fall 3 rise 2

