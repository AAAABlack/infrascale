
# ── Nginx reverse proxy configuration for InfraScale Dashboard ────
# This configuration sits in front of the Python webapp container and
# handles HTTP routing, static file serving, and request buffering.

# Run as the nginx user (non-root) for security
user nginx;

# Auto-detect the number of CPU cores for worker process count
worker_processes auto;

# Log errors so they appear in container logs
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker process
    worker_connections 1024;
}

http {
    # Include the standard MIME type mappings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Define a custom log format including upstream response time
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'upstream_time=$upstream_response_time';

    # Send access logs to stdout for container logging
    access_log /var/log/nginx/access.log main;

    # Enable efficient file transfer
    sendfile on;

    # Keepalive timeout
    keepalive_timeout 65;

    # ── Upstream block ─────────────────────────────────────────────
    # 'webapp' is resolved via Docker Compose internal DNS
    upstream dashboard_backend {
        server webapp:5000;
    }

    # ── Server block ───────────────────────────────────────────────
    server {
        # Listen on port 80 inside the container
        listen 80;
        server_name localhost;

        # Forward all requests to the backend
        location / {
            proxy_pass http://dashboard_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for slow responses
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint for nginx itself
        location /nginx-health {
            access_log off;
            return 200 "nginx is healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
